<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Handmade | Store</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Inter', sans-serif;
    color: #333;
    background-color: #fff;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: flex-start;
    padding: 20px 5%;
    background: #fff;
    border-bottom: 1px solid #eee;
    position: sticky;
    top: 0;
}

.logo {
    font-size: 1.4rem;
    font-weight: 600;
}

/* HERO */
.hero {
    position: relative;
    text-align: center;
    padding: 160px 20px;
    background: url('https://images.unsplash.com/photo-1520975922284-8b456906c813?q=80&w=1200') center/cover no-repeat fixed;
    color: #fff;
}

.hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg,
        rgba(225,48,108,0.6),
        rgba(131,58,180,0.6),
        rgba(253,29,29,0.6));
}

.hero-content {
    position: relative;
    z-index: 1;
}

.hero h1 {
    font-size: 3rem;
    opacity: 0;
    transform: translateX(-40px);
    animation: slideIn 1s forwards;
}

.hero p {
    margin: 20px 0;
    opacity: 0;
    transform: translateX(40px);
    animation: slideIn 1s 0.3s forwards;
}

.btn-primary {
    background: #fff;
    color: #111;
    padding: 14px 30px;
    border-radius: 30px;
    display: inline-block;
    margin-top: 10px;
    opacity: 0;
    transform: translateY(30px);
    animation: slideUp 1s 0.6s forwards;
}

.btn-primary:hover {
    background: #eee;
}

/* Slider */
.section-title {
    text-align: center;
    margin: 60px 0 30px;
}

.slider {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
}

#slider-image {
    width: 280px;
    height: 280px;
    object-fit: cover;
    border-radius: 8px;
}

.slider button {
    background: #111;
    color: #fff;
    border: none;
    padding: 10px;
    cursor: pointer;
}

/* Buy button below slider */
.buy-btn {
    display: block;
    width: fit-content;
    margin: 0 auto 80px;
    background: #111;
    color: #fff;
    padding: 12px 25px;
    border-radius: 5px;
    font-weight: 500;
}

.buy-btn:hover {
    background: #333;
}

/* Footer */
.footer {
    background: #111;
    color: #aaa;
    text-align: center;
    padding: 30px;
}

/* Animations */
@keyframes slideIn {
    to { opacity: 1; transform: translateX(0); }
}

@keyframes slideUp {
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<nav class="navbar">
    <div class="logo">AR Handmade</div>
</nav>

<section class="hero">
    <div class="hero-content">
        <h1>Crafted for the Everyday</h1>
        <p>Handmade bags and custom keychains designed with care.</p>
        <a href="https://www.instagram.com/ar_handmade__?igsh=MWgxcGNpYTM4dmNzaA==" class="btn-primary">
            Shop on Instagram
        </a>
    </div>
</section>

<h2 class="section-title">Featured Pieces</h2>

<div class="slider">
    <button class="prev">&#10094;</button>
    <img id="slider-image" src="1.jpeg">
    <button class="next">&#10095;</button>
</div>

<a href="https://www.instagram.com/ar_handmade__?igsh=MWgxcGNpYTM4dmNzaA==" target="_blank" class="buy-btn">
    Click here to Buy
</a>

<footer class="footer">
    <p>© 2026 AR Handmade. All rights reserved.</p>
</footer>

<script>
const images = [
"1.jpeg","2.jpeg","3.jpeg","4.jpeg","5.jpeg",
"6.jpeg","7.jpeg","8.jpeg","9.jpeg","10.jpeg"
];

let current = 0;
const img = document.getElementById("slider-image");

document.querySelector(".next").onclick = () => {
    current = (current + 1) % images.length;
    img.src = images[current];
};

document.querySelector(".prev").onclick = () => {
    current = (current - 1 + images.length) % images.length;
    img.src = images[current];
};
</script>

</body>
</html>
